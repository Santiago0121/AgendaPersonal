<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <title>GuitarApp — Iniciar sesión</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0f0f0f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      font-size: 40px;
      display: block;
      margin-bottom: 12px;
    }

    .logo h1 {
      color: #ffffff;
      font-size: 22px;
      font-weight: 600;
    }

    .logo p {
      color: #666;
      font-size: 13px;
      margin-top: 4px;
    }

    .flash {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .flash.error {
      background: #2a1515;
      border: 1px solid #5a2020;
      color: #f87171;
    }

    .flash.success {
      background: #0f2a1a;
      border: 1px solid #1a5a30;
      color: #4ade80;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      color: #999;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 12px 14px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #f97316;
    }

    button[type="submit"] {
      width: 100%;
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    button[type="submit"]:hover {
      background: #ea6b10;
    }

    .footer-text {
      text-align: center;
      color: #444;
      font-size: 12px;
      margin-top: 28px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon-wrap">
        <i class="fa-solid fa-guitar"></i>
      </div>
      <h1>GuitarApp</h1>
      <p>Agenda profesional para músicos</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" name="email" placeholder="tu@email.com" required autofocus>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit">Iniciar sesión</button>
    </form>

    <p class="footer-text">¿No tienes cuenta? Contacta al administrador.</p>
  </div>
</body>
</html>
